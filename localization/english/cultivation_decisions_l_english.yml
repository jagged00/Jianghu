l_english:
  open_meridians_decision:0 "Open the Meridian Gates"
  open_meridians_decision_desc:0 "To tread even the first step on the immortal road, incense, spirit paper, and guiding reagents must be burned. A wealthy clan may afford this trial for anyone, but heaven-favored meridians are worth investing in at a lower price."
  open_meridians_decision_selection_tooltip:0 "Spend gold to test whether your body can bear qi. Characters with good or better meridians need a smaller investment."
  open_meridians_decision_tooltip:0 "Enter seclusion and pay the required cultivation expenses."
  open_meridians_decision_confirm:0 "Burn the spirit reagents"

  begin_cultivation_decision:0 "Receive Sect Initiation"
  begin_cultivation_decision_desc:0 "A true sect does not hand out qi manuals to outsiders. Only after joining a mountain gate may you pay for incense, pills, and instruction to begin the long climb along the immortal path."
  begin_cultivation_decision_selection_tooltip:0 "Only sect members may begin cultivation. Pay the initiation cost to unlock the Immortal Path tree; completing each tree grants the next realm trait."
  begin_cultivation_decision_tooltip:0 "Pay for your initiation and begin walking the sect-controlled immortal path."
  begin_cultivation_decision_confirm:0 "Kowtow before the ancestral hall"
  begin_cultivation_decision_effect_tooltip:0 "You become a sect initiate and may now advance by finishing cultivation perk trees."

  focus_on_cultivation:0 "Enter Closed-Door Cultivation"
  focus_on_cultivation_tooltip:0 "Withdraw for several months to temper qi and deepen your realm."
  focus_on_cultivation_selection_tooltip:0 "Temporarily devote yourself to cultivation at the expense of worldly affairs."
  focus_on_cultivation_desc:0 "You close your gates, still your heart, and spend the coming months refining qi while the mundane world turns without you."
  focus_on_cultivation_effect_tooltip:0 "You focus entirely on cultivation."
  focus_on_cultivation_confirm:0 "Seal the cave abode"

  grant_qi_gathering_to_meridian_holders_decision:0 "Bestow Qi on Meridian Bearers"
  grant_qi_gathering_to_meridian_holders_decision_desc:0 "Only a cultivator may dare force open the path for others. With enough authority and spiritual attainment, you can awaken those around you who already possess active meridians."
  grant_qi_gathering_to_meridian_holders_decision_confirm:0 "Let worthy meridians resonate"
  qi_gathering_granted_tooltip:0 "As a cultivator, awaken active-meridian courtiers, vassals, and realm characters onto the path of qi gathering."
