l_english:
  open_meridians_decision:0 "Open the Meridian Gates"
  open_meridians_decision_desc:0 "Retreat into stillness, guide breath through the hidden channels, and gamble whether your body was born to bear the currents of qi."
  open_meridians_decision_selection_tooltip:0 "Risk enlightenment and discover the quality of your meridians."
  open_meridians_decision_tooltip:0 "Enter seclusion"
  open_meridians_decision_confirm:0 "Circulate the first breath"

  begin_cultivation_decision:0 "Step onto the Immortal Road"
  begin_cultivation_decision_desc:0 "Your meridians have opened. Now you may kindle the first thread of qi and leave the dust of ordinary mortals behind."
  begin_cultivation_decision_selection_tooltip:0 "Gain your first realm trait and begin true cultivation."
  begin_cultivation_decision_tooltip:0 "Begin cultivating"
  begin_cultivation_decision_confirm:0 "Let qi enter the dantian"
  begin_cultivation_decision_effect_tooltip:0 "You begin your cultivation journey."

  focus_on_cultivation:0 "Enter Closed-Door Cultivation"
  focus_on_cultivation_tooltip:0 "Withdraw for several months to temper qi and deepen your realm."
  focus_on_cultivation_selection_tooltip:0 "Temporarily devote yourself to cultivation at the expense of worldly affairs."
  focus_on_cultivation_desc:0 "You close your gates, still your heart, and spend the coming months refining qi while the mundane world turns without you."
  focus_on_cultivation_effect_tooltip:0 "You focus entirely on cultivation."
  focus_on_cultivation_confirm:0 "Seal the cave abode"

  breakthrough_decision_1:0 "Forge the Foundation"
  breakthrough_decision_1_desc:0 "Gather every strand of loose qi, purge mortal dregs, and lay the immortal foundation that will bear all future realms."
  breakthrough_decision_1_selection_tooltip:0 "Attempt to rise from Qi Gathering into Foundation Establishment."
  breakthrough_decision_1_tooltip:0 "Break through into Foundation Establishment"
  breakthrough_decision_1_confirm:0 "Let the foundation descend"
  breakthrough_decision_1_valid_description:0 "Reach the peak of Qi Gathering before attempting this breakthrough."

  breakthrough_decision_2:0 "Condense the Core"
  breakthrough_decision_2_desc:0 "Compress your essence into a blazing core that can endure the pressure of heaven and earth."
  breakthrough_decision_2_selection_tooltip:0 "Attempt to rise from Foundation Establishment into Core Formation."
  breakthrough_decision_2_tooltip:0 "Break through into Core Formation"
  breakthrough_decision_2_confirm:0 "Condense the golden core"
  breakthrough_decision_2_valid_description:0 "Reach the peak of Foundation Establishment before attempting this breakthrough."

  breakthrough_decision_3:0 "Nurture the Nascent Soul"
  breakthrough_decision_3_desc:0 "Let spirit and core resonate until a living soul-form is born within the dantian."
  breakthrough_decision_3_selection_tooltip:0 "Attempt to rise from Core Formation into Nascent Soul."
  breakthrough_decision_3_tooltip:0 "Break through into Nascent Soul"
  breakthrough_decision_3_confirm:0 "Manifest the nascent soul"
  breakthrough_decision_3_valid_description:0 "Reach the peak of Core Formation before attempting this breakthrough."

  breakthrough_decision_4:0 "Sever Mortal Attachments"
  breakthrough_decision_4_desc:0 "Cut away lingering shackles of self, fate, and illusion so your spirit may advance unburdened."
  breakthrough_decision_4_selection_tooltip:0 "Attempt to rise from Nascent Soul into Spirit Severing."
  breakthrough_decision_4_tooltip:0 "Break through into Spirit Severing"
  breakthrough_decision_4_confirm:0 "Sever the final fetters"
  breakthrough_decision_4_valid_description:0 "Reach the peak of Nascent Soul before attempting this breakthrough."

  breakthrough_decision_5:0 "Seek the Great Dao"
  breakthrough_decision_5_desc:0 "Peer beyond techniques and forms to seize a fragment of the Great Dao itself."
  breakthrough_decision_5_selection_tooltip:0 "Attempt to rise from Spirit Severing into Dao Seeking."
  breakthrough_decision_5_tooltip:0 "Break through into Dao Seeking"
  breakthrough_decision_5_confirm:0 "Pursue heavenly truth"
  breakthrough_decision_5_valid_description:0 "Reach the peak of Spirit Severing before attempting this breakthrough."

  breakthrough_decision_6:0 "Ascend Beyond Mortality"
  breakthrough_decision_6_desc:0 "Cast off the final shell of mortality and claim a place among immortals beneath the endless heavens."
  breakthrough_decision_6_selection_tooltip:0 "Attempt to rise from Dao Seeking into Immortal Ascension."
  breakthrough_decision_6_tooltip:0 "Break through into Immortal Ascension"
  breakthrough_decision_6_confirm:0 "Face the heavenly ascent"
  breakthrough_decision_6_valid_description:0 "Reach the peak of Dao Seeking before attempting this breakthrough."

  breakthrough_decision_effect_tooltip:0 "You challenge the next great realm."
