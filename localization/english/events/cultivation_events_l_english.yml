l_english:
  cultivation_important_event.001.title:0 "The Meridian Gates Tremble"
  cultivation_important_event.001.desc:0 "In the hush between breaths, you sense hidden rivers inside your body. If you force them open, fortune may grant you peerless channels—or leave you with only ordinary talent."
  cultivation_important_event.001.a:0 "Trust heaven's decree."
  cultivation_important_event.001.b:0 "Burn rare reagents and force a smoother opening."
  cultivation_important_event.001.c:0 "Withdraw and prepare further."

  cultivation_important_event.010.title:0 "The First Strand of Qi"
  cultivation_important_event.010.desc:0 "After long sect tempering, your meridians finally tremble at the edge of true awakening. One final push will decide whether you step into Qi Gathering or remain an initiated mortal a little longer."
  cultivation_important_event.010.a:0 "Gather the first strand."
  cultivation_important_event.010.b:0 "I need more tempering before I dare this step."
  cultivation_important_event.011.title:0 "Foundation Under Heaven"
  cultivation_important_event.011.desc:0 "The gathered qi crashes through your body like a mountain torrent. If your dao heart does not waver, an immortal foundation will be born tonight."
  cultivation_important_event.011.a:0 "Break through."
  cultivation_important_event.011.b:0 "Consume a breakthrough herb and advance."
  cultivation_important_event.011.c:0 "My heart is not yet steady."

  cultivation_important_event.012.title:0 "A Core Like the Rising Sun"
  cultivation_important_event.012.desc:0 "Essence, blood, and spirit spiral into one blazing point within your dantian. One mistake and the furnace shatters; one success and your core is born."
  cultivation_important_event.012.a:0 "Condense it now."
  cultivation_important_event.012.b:0 "Use a breakthrough herb to stabilize the furnace."
  cultivation_important_event.012.c:0 "Not yet."

  cultivation_important_event.013.title:0 "Birth of the Nascent Soul"
  cultivation_important_event.013.desc:0 "Your core quivers, your spirit rises, and a second self struggles to emerge from the sea of consciousness."
  cultivation_important_event.013.a:0 "Let the soul be born."
  cultivation_important_event.013.b:0 "Use a breakthrough herb to protect the soul."
  cultivation_important_event.013.c:0 "I will wait for deeper insight."

  cultivation_important_event.014.title:0 "Severing the Spirit"
  cultivation_important_event.014.desc:0 "To advance further, you must cut away mortal attachments as though slicing silk from the soul. A weak blade will wound only yourself."
  cultivation_important_event.014.a:0 "Sever it."
  cultivation_important_event.014.b:0 "Use a breakthrough herb and steel the spirit."
  cultivation_important_event.014.c:0 "I still hear too many worldly echoes."

  cultivation_important_event.015.title:0 "Tracing the Great Dao"
  cultivation_important_event.015.desc:0 "The laws of heaven hover just beyond mortal comprehension. If you can seize a fragment, your path will no longer belong to ordinary cultivators."
  cultivation_important_event.015.a:0 "Seek the Dao."
  cultivation_important_event.015.b:0 "Use a breakthrough herb and challenge heaven."
  cultivation_important_event.015.c:0 "I must contemplate longer."

  cultivation_important_event.016.title:0 "Before the Gate of Immortality"
  cultivation_important_event.016.desc:0 "Life and death stand behind you. Ahead lies only ascension, tribulation, and the chance to claim an undying name."
  cultivation_important_event.016.a:0 "Ascend."
  cultivation_important_event.016.b:0 "Use a breakthrough herb and challenge eternity."
  cultivation_important_event.016.c:0 "I refuse to gamble my dao heart today."

  cultivation_regular_event.101.t:0 "A Rogue Cultivator's Offer"
  cultivation_regular_event.101.desc:0 "A dusty wanderer produces a lacquered box and whispers that the herb within can aid your next breakthrough. His smile suggests either great fortune or a very elegant scam."
  cultivation_regular_event.101.a:0 "Take it by force and swallow it at once."
  cultivation_regular_event.101.b:0 "Take it by force and save it for later."
  cultivation_regular_event.101.c:0 "Pay the price and consume it now."
  cultivation_regular_event.101.d:0 "Pay the price and store it in my ring."
  cultivation_regular_event.101.e:0 "Send this peddler away."

  cultivation_regular_event.102.t:0 "A Pocket Realm Opens"
  cultivation_regular_event.102.desc:0 "A crack in space yawns open among the hills, revealing a pocket realm where time churns faster than the mortal world. The opportunity is precious, but unstable realms devour the careless."
  cultivation_regular_event.102.a:0 "Cultivate there for a single measured hour."
  cultivation_regular_event.102.b:0 "Risk three hours beneath warped time."
  cultivation_regular_event.102.c:0 "Great opportunities demand great risks—five hours."
  cultivation_regular_event.102.d:0 "Ignore the temptation."
