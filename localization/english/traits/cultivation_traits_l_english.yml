l_english:
  trait_cultivation_realm:0 "Cultivation Realm"

  trait_qi_gathering:0 "Qi Gathering"
  trait_qi_gathering_desc:0 "This character has only just opened the immortal road, drawing the first threads of heaven-and-earth qi into the dantian."
  trait_qi_gathering_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] stands at the Qi Gathering realm, having taken the first true step toward immortality."
  trait_track_stage:0 "Minor Realms"
  trait_track_stage_desc:0 "Each breath, each cycle, and each insight deepens this character's first foundation in cultivation."

  trait_foundation_establishment:0 "Foundation Establishment"
  trait_foundation_establishment_desc:0 "This character has cleansed mortal impurities and forged a stable dao foundation within the dantian."
  trait_foundation_establishment_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] has reached Foundation Establishment, standing far above wandering mortals."
  trait_track_foundation:0 "Foundation Tempering"
  trait_track_foundation_desc:0 "The spirit platform is refined layer by layer until it can bear the weight of heaven's will."

  trait_core_formation:0 "Core Formation"
  trait_core_formation_desc:0 "This character has condensed a radiant core, binding essence and will into a furnace of immortal potential."
  trait_core_formation_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip]'s golden core burns bright within, announcing a true cultivator of stature."
  trait_track_core:0 "Core Tempering"
  trait_track_core_desc:0 "Every turn of qi tempers the golden core until it shines like a miniature sun."

  trait_nascent_soul:0 "Nascent Soul"
  trait_nascent_soul_desc:0 "This character's spirit has taken shape beyond flesh, allowing the soul itself to stand against heaven's pressure."
  trait_nascent_soul_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] has birthed a Nascent Soul, stepping into a realm that lesser cultivators can only revere."
  trait_track_soul:0 "Soul Nurture"
  trait_track_soul_desc:0 "The nascent soul grows clearer, stronger, and nearer to true transcendence with every insight."

  trait_spirit_severing:0 "Spirit Severing"
  trait_spirit_severing_desc:0 "This character has cut away bindings of fear, attachment, and mortal karma to sharpen the true spirit."
  trait_spirit_severing_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] has entered Spirit Severing, where each severed attachment becomes a blade against fate."
  trait_track_spirit:0 "Severing"
  trait_track_spirit_desc:0 "Each severed attachment frees more of the true spirit from worldly dust."

  trait_dao_seeking:0 "Dao Seeking"
  trait_dao_seeking_desc:0 "This character walks at the edge of heavenly mystery, pursuing truths that lesser cultivators can scarcely endure to behold."
  trait_dao_seeking_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] treads the Dao Seeking realm, chasing revelations hidden beyond ordinary heaven and earth."
  trait_track_dao:0 "Dao Insight"
  trait_track_dao_desc:0 "Fleeting revelations are hammered into enduring comprehension of the Great Dao."

  trait_immortal_ascension:0 "Immortal Ascension"
  trait_immortal_ascension_desc:0 "This character has crossed the threshold of mortality and laid claim to a fragment of eternity."
  trait_immortal_ascension_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] has ascended beyond the mortal coil and now walks among the ranks of immortals."
  trait_track_ascension:0 "Immortal Steps"
  trait_track_ascension_desc:0 "Each step forward deepens this character's claim upon eternity itself."
