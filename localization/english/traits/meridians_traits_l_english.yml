l_english:
  trait_active_meridians:0 "Awakened Meridians"
  trait_poor_meridians:0 "Poor Meridians"
  trait_poor_meridians_desc:0 "The meridians in this body are clogged and brittle, leaving only a dim hope of walking the immortal road."
  trait_poor_meridians_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip]'s meridians are shallow and obstructed, making cultivation painfully difficult."

  trait_normal_meridians:0 "Normal Meridians"
  trait_normal_meridians_desc:0 "These meridians are serviceable enough for a disciple to begin training, though talent will not carry them far by itself."
  trait_normal_meridians_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] possesses ordinary meridians that can sustain a modest cultivation foundation."

  trait_good_meridians:0 "Good Meridians"
  trait_good_meridians_desc:0 "The qi channels are broad and steady, a gift that sect elders would consider worth nurturing."
  trait_good_meridians_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] has good meridians, allowing qi to circulate with uncommon ease."

  trait_excellent_meridians:0 "Excellent Meridians"
  trait_excellent_meridians_desc:0 "These meridians shine with rare purity, making breakthroughs smoother and drawing the gaze of powerful sects."
  trait_excellent_meridians_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip]'s excellent meridians mark [ROOT.GetCharacter.GetHerHim] as a true seedling of immortality."

  trait_heavenly_meridians:0 "Heavenly Meridians"
  trait_heavenly_meridians_desc:0 "A once-in-an-age physique whose meridians resonate with the heavens themselves."
  trait_heavenly_meridians_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] bears heavenly meridians, the sort of talent for which sects would trade mountains of spirit stones."
